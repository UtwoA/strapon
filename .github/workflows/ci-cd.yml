name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Validate Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js

      - name: Basic HTML sanity check
        run: |
          grep -qi "<!doctype html>" index.html
          grep -qi "<title>" index.html

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload release files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "index.html,styles.css,script.js,scripts/deploy.sh"
          target: "/tmp/strapon-site"
          strip_components: 0

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            chmod +x /tmp/strapon-site/scripts/deploy.sh
            bash /tmp/strapon-site/scripts/deploy.sh /tmp/strapon-site ${{ secrets.VPS_DEPLOY_PATH }}
            if command -v systemctl >/dev/null 2>&1; then
              sudo systemctl reload nginx || true
            fi
